<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
    <title>Contact</title>
</head>

<body>
     <div class="container">
    <div class="sec-one">
        <h1 class="sec-one__name">Santhosh</h1>
        <p class="sec-one__role">Web Developer</p>
        <a class="sec-one__contact" href="index.html">Home</a>
    </div>

    <div class="sec__contact">
    <form>
        <table>
            <tr>
                <td>Name:</td>
                <td><input type="text" placeholder="Enter your Name" class="sec__contact-input" ></td>
            </tr>
            <tr>
                <td>Age:</td>
                <td><input type="number" placeholder="Enter your Age" class="sec__contact-input"></td>
            </tr>
            <tr>
                <td>Address:</td>
                <td><textarea placeholder="Address......" class="sec__contact-textarea"></textarea></td>
            </tr>
            <tr>
                <td>Department:</td>
                <td><select>
                        <option>HTML</option>
                        <option>CSS</option>
                        <option>JS</option>
                    </select></td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" class="sec__contact-submit"></td>
            </tr>
        </table>
    </form>
    </div>

     <div class="sec-five"> 
    <p class="sec-five__title">Social media:
        <a href="https://https://www.instagram.com/mr._santhosh_official__">Instagram</a>,
        <a href="https://www.linkedin.com/in/mr-santhosh-k">Linkedin</a>
    </p>

    <p class="sec-five__desc">&copy;Santhosh</p>
    </div>
</body>

</html>
